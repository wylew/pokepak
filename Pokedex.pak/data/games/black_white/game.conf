note=Introduces 156 new Unova Pokemon (dex_id 1-156) for a national total of 649. First game to lock the regional dex to new Pokemon only until post-game; no Kanto/Johto/Hoenn/Sinnoh Pokemon are obtainable before the National Dex is unlocked. No new types introduced in Gen V. Pre-Fairy typing throughout: Cottonee/Whimsicott are pure Grass, Togekiss is Normal/Flying, Gardevoir/Ralts pure Psychic, Mawile pure Steel. Tornadus is pure Flying (only pure Flying type in the dex). Basculin, Tornadus, Thundurus, Landorus, and Meloetta have alternate formes flagged with form_tag. Victini is the first Pokemon in the dex at entry 000 in-game, reflected here as dex_id 1.
