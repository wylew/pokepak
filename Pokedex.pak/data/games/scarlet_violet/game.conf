note=Introduces 103 new Paldean Pokemon (dex_id 1-120 including DLC additions) for a national total of 1025. First fully open-world mainline Pokemon games. Paldean regional forms: Tauros (Combat/Blaze/Aqua variants, all Fighting-based). New cross-gen evolutions: Annihilape (Fighting/Ghost from Primeape), Clodsire (Poison/Ground from Wooper), Farigiraf (Normal/Psychic from Girafarig), Dudunsparce (Normal from Dunsparce), Kingambit (Dark/Steel from Bisharp), Archaludon (Steel/Dragon from Duraludon, DLC). Paradox Pokemon introduced as ancient/future variants (dex_id 79-90, 100-101, 116-118). Teal Mask DLC adds Dipplin, Poltchageist, Sinistcha, Okidogi, Munkidori, Fezandipiti, Ogerpon. Indigo Disk DLC adds Archaludon, Hydrapple, Gouging Fire, Raging Bolt, Iron Boulder, Iron Crown, Terapagos, Pecharunt. Tera Type mechanic introduced allowing any Pokemon to change type in battle. All prior Fairy retypes and regional forms carry forward in national dex section.
