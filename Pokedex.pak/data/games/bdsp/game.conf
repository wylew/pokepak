note=Remakes of Pokemon Diamond & Pearl developed by ILCA. Regional Sinnoh Dex covers the original 150 D/P entries (dex_id 1-107 are Sinnoh-native, 108+ national). National Dex expands to 493. Notably faithful to D/P rather than Platinum; Platinum's expanded 210-entry regional dex and Battle Frontier are absent. Grand Underground replaces the original Underground. All Gen VI Fairy retypes apply throughout: Togekiss is Fairy/Flying, Gardevoir Psychic/Fairy, Mawile Steel/Fairy, Clefairy pure Fairy, Snubbull pure Fairy, Marill Water/Fairy, Ralts/Kirlia Psychic/Fairy, Mime Jr./Mr. Mime Psychic/Fairy, Togepi/Togetic Fairy/Fairy-Flying. Galarian or other regional forms not available.
