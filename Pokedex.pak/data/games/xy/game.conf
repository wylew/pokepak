note=Introduces 72 new Kalos Pokemon (dex_id 1-72) for a national total of 721. First 3DS mainline games; first to feature full 3D polygon graphics. Fairy type introduced, retroactively retyping numerous existing Pokemon: Cleffa/Clefairy/Clefable (Normal to Fairy), Igglybuff/Jigglypuff/Wigglytuff (Normal to Normal/Fairy), Togepi (Normal to Fairy), Togetic (Normal/Flying to Fairy/Flying), Togekiss (Normal/Flying to Fairy/Flying), Snubbull/Granbull (Normal to Fairy), Marill/Azumarill (Water to Water/Fairy), Azurill (Normal to Normal/Fairy), Ralts/Kirlia/Gardevoir (Psychic to Psychic/Fairy), Mawile (Steel to Steel/Fairy), Cottonee/Whimsicott (Grass to Grass/Fairy), Mr. Mime/Mime Jr. (Psychic to Psychic/Fairy). Mega Evolutions introduced for select Pokemon but are not separate dex entries. First games with in-game Pokemon-Amie and Super Training features.
