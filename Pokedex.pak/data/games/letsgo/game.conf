note=First mainline Pokemon games on Nintendo Switch. Kanto-only dex of 151 Pokemon plus Meltan and Melmetal (dex_id 152-153, national 808-809), introduced via Pokemon GO connectivity. No cross-gen evolutions, no breeding, no held items, and no random wild encounters - Pokemon are caught GO-style in the overworld. Partner Pikachu (LGPE) or Eevee (LGEE) cannot evolve and have exclusive moves, but are not separate dex entries. Alolan forms of Kanto Pokemon are obtainable via in-game trades but are not separate dex entries here. All Gen VI Fairy types apply: Clefairy/Clefable pure Fairy, Jigglypuff/Wigglytuff Normal/Fairy, Mr. Mime Psychic/Fairy. Magnemite/Magneton Electric/Steel. Meltan and Melmetal are pure Steel.
