note=Introduces 81 new Alola Pokemon (dex_id 1-81) and 18 Alolan regional forms (dex_id 82-114) for a national total of 802. Regional forms share national_id with their base form and are tagged Regional in form_tag. Key Alolan retypes: Raichu adds Psychic, Sandshrew/Sandslash become Ice/Steel, Vulpix becomes Ice, Ninetales becomes Ice/Fairy, Diglett/Dugtrio add Steel, Meowth/Persian become Dark, Geodude/Graveler/Golem add Electric, Grimer/Muk add Dark, Exeggutor becomes Grass/Dragon, Marowak becomes Fire/Ghost, Rattata/Raticate become Dark/Normal. Gym Leaders replaced by Island Trials and Kahunas. Z-Moves introduced. All Gen VI Fairy retypes carry forward throughout national dex entries.
