note=Remakes of Pokemon Ruby & Sapphire. Regional Hoenn Dex covers 135 Pokemon (dex_id 1-135, national_id 252-386). National Dex expands to 721. All Gen VI Fairy type retroactive retypes apply throughout: Ralts/Kirlia/Gardevoir and Mawile in the Hoenn section are correctly typed as Psychic/Fairy and Steel/Fairy respectively. Primal Reversion introduced for Kyogre and Groudon (Primal formes) and additional Mega Evolutions added beyond X&Y, but all are forme changes not new dex entries. Delta Episode adds Rayquaza/Deoxys story content post-game. Dex structure mirrors R/S/Emerald with Hoenn Pokemon first.
