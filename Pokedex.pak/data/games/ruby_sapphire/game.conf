note=Introduces 135 new Hoenn Pokemon (dex_id 1-135) for a national total of 386. Kanto and Johto Pokemon (dex_id 136-386) are not obtainable in-game without trading from FireRed/LeafGreen or events. No new types introduced in Gen III. Ralts is pure Psychic (pre-Fairy). Mawile is pure Steel (pre-Fairy). Snubbull/Granbull remain Normal (pre-Fairy). Togepi/Togetic remain Normal/Flying (pre-Fairy). Marill remains pure Water (pre-Fairy). Wynaut introduced here as Wobbuffet baby via breeding.
