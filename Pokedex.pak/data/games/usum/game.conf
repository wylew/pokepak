note=Enhanced versions of Sun & Moon. Adds 5 new Pokemon (dex_id 838-842, national 803-807): Poipole, Naganadel, Stakataka, Blacephalon, and Zeraora, bringing the national total to 807. All 18 Alolan regional forms from S/M retained. Expanded story involving the Ultra Recon Squad and Necrozma's Dusk Mane/Dawn Wings fusions (forme changes, not new dex entries). Ultra Wormholes allow travel to other regions and catching of legendary Pokemon from prior games. Last mainline Pokemon games on Nintendo 3DS. All types and Alolan forms identical to Sun & Moon otherwise.
