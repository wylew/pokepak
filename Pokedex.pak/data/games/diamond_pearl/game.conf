note=Introduces 107 new Sinnoh Pokemon (dex_id 1-107) for a national total of 493. Many existing Pokemon receive new evolutions: Togekiss, Magnezone, Lickilicky, Rhyperior, Tangrowth, Electivire, Magmortar, Yanmega, Leafeon, Glaceon, Gliscor, Mamoswine, Porygon-Z, Gallade, Probopass, Dusknoir, Froslass, Weavile, Ambipom, Mismagius, Honchkrow. New baby Pokemon: Budew, Chingling, Bonsly, Mime Jr., Happiny, Munchlax, Mantyke. Pre-Fairy typing throughout: Togekiss is Normal/Flying, Ralts/Gardevoir/Mawile/Snubbull/Marill/Clefairy all retain pre-Fairy types. Rotom is Electric/Ghost. Giratina is Ghost/Dragon.
