note=Third version of the Gen III Hoenn games. Same 386-Pokemon dex as Ruby & Sapphire in identical order. Both version-exclusive Pokemon from R/S (e.g. Lotad/Lombre/Ludicolo and Seedot/Nuzleaf/Shiftry, Zangoose/Seviper, Lunatone/Solrock) are obtainable in a single game. Rayquaza plays a central story role. Adds the Battle Frontier post-game. Wallace becomes Champion; Steven returns as a superboss. Dex composition and types identical to Ruby & Sapphire.
