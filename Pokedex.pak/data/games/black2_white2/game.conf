note=Sequels to Black & White, set two years later in Unova. Same 649-Pokemon national dex in identical order. The regional Unova Dex expanded from 156 to 300 entries, making Pokemon from earlier generations available in-game before the National Dex. Last mainline Pokemon games released on Nintendo DS. Introduces Pokemon World Tournament, allowing rematches with Gym Leaders and Champions from all prior regions. Kyurem's Black and White formes (via DNA Splicers with Zekrom/Reshiram) introduced but are forme changes, not new dex entries. All types identical to Black & White.
