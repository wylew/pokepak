note=Open-world action RPG set in the ancient Hisui region (historical Sinnoh). 242 unique dex entries in Hisui dex order, including Hisuian regional forms and new evolutions exclusive to this game. New Pokemon introduced: Wyrdeer (899, Normal/Psychic from Stantler), Kleavor (900, Bug/Rock from Scyther), Ursaluna (901, Ground/Normal from Ursaring), Basculegion (902, Water/Ghost from Basculin White), Sneasler (903, Fighting/Poison from Hisuian Sneasel), Overqwil (904, Dark/Poison from Hisuian Qwilfish), Enamorus (905, Fairy/Flying). Hisuian forms: Typhlosion (Fire/Ghost), Zorua/Zoroark (Normal/Ghost), Braviary (Psychic/Flying), Goomy/Sliggoo/Goodra (Steel/Dragon), Bergmite/Avalugg (Ice/Rock), Decidueye (Grass/Fighting). Traditional gym/badge structure absent; replaced by Noble Pokemon frenzies and survey missions. No held items or trading evolutions in the traditional sense.
