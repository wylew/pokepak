note=First mainline Pokemon games on Nintendo Switch with HD graphics. Introduces 89 new Galar Pokemon (dex_id 1-89) for a national total of 898 including DLC. Galarian regional forms: Meowth (Steel), Ponyta (Psychic), Rapidash (Psychic/Fairy), Slowpoke (Psychic), Slowbro (Poison/Psychic), Slowking (Poison/Psychic), Farfetch'd (Fighting), Weezing (Poison/Fairy), Mr. Mime (Ice/Psychic), Zigzagoon/Linoone (Dark/Normal), Corsola (Ghost), Yamask (Ground/Ghost), Darumaka (Ice), Darmanitan (Ice/Fire), Voltorb/Electrode (Electric/Grass), Stunfisk (Ground/Steel). New cross-gen evolutions: Obstagoon from Galarian Linoone, Perrserker from Galarian Meowth, Cursola from Galarian Corsola, Sirfetch'd from Galarian Farfetch'd, Mr. Rime from Galarian Mr. Mime, Runerigus from Galarian Yamask. Isle of Armor and Crown Tundra DLC add Pokemon up to national 898. Gigantamax forms exist for select Pokemon but are not separate dex entries. Dynamax mechanic introduced.
