note=Remakes of Pokemon Gold & Silver. In-game Johto Dex covers the original 251 Pokemon (dex_id matches national_id). National Dex expands to 493 post-game. Both Kanto and Johto are fully explorable. Pokemon follow the player outside their Pokeball (first time since Yellow). All Gen IV cross-gen evolutions are obtainable (Togekiss, Magnezone, Leafeon, Glaceon, etc.) but are not part of the regional 251-entry dex. Togepi/Togetic remain Normal/Normal-Flying (pre-Fairy). Snubbull/Granbull remain Normal (pre-Fairy). Marill remains pure Water (pre-Fairy). Types otherwise identical to Gold & Silver.
