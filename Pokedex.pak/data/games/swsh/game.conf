note=Introduces 89 new Galar Pokemon (dex_id 1-89) and 18 Galarian regional forms (dex_id 90-107) for a national total of 898 including DLC. Base game Galar Dex has 400 entries; Isle of Armor and Crown Tundra DLC expand the national total to 898. Key Galarian form typings: Ponyta/Rapidash Psychic/Fairy, Slowpoke/Slowbro Psychic and Poison/Psychic, Farfetch'd Fighting, Weezing Poison/Fairy, Mr. Mime Ice/Psychic, Articuno Psychic/Flying, Zapdos Fighting/Flying, Moltres Dark/Flying, Slowking Poison/Psychic, Zigzagoon/Linoone Dark/Normal, Darumaka/Darmanitan Ice, Yamask Ghost, Stunfisk Ground/Steel. New evolutions from Galarian forms: Obstagoon (from Galarian Linoone), Perrserker (from Galarian Meowth), Cursola (from Galarian Corsola), Sirfetch'd (from Galarian Farfetch'd), Mr. Rime (from Mime Jr.), Runerigus (from Galarian Yamask). Dynamax and Gigantamax mechanics introduced. First game to cut non-native Pokemon from obtainability (Dexit controversy).
