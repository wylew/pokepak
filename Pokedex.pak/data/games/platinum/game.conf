note=Third version of the Gen IV Sinnoh games. Same 493-Pokemon national dex as Diamond & Pearl in identical order. The regional Sinnoh Dex was expanded from 150 to 210 entries compared to D/P, making more Pokemon available in-game without trading. Giratina's Origin Forme and the Distortion World are introduced. Battle Frontier added post-game. Rotom gains five new appliance forms (Heat, Wash, Frost, Fan, Mow) but these are forme changes, not separate dex entries. All types identical to Diamond & Pearl.
